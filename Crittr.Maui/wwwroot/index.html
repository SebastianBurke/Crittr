<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Crittr — track exotic pets, enclosures, and feedings." />
    <meta name="theme-color" content="#059669" />
    <title>Crittr</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />

    <link href="_content/Crittr.App/css/output.css" rel="stylesheet" />
    <link href="_content/Crittr.App/css/crittr-v1.css" rel="stylesheet" />
    <link rel="stylesheet" href="Crittr.Maui.styles.css" />

    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <link rel="icon" type="image/png" href="_content/Crittr.App/img/icons/Crittr.ico" />
</head>

<body class="min-h-screen antialiased bg-white text-slate-900 dark:bg-gray-950 dark:text-slate-100" style="font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;">

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="flex h-screen items-center justify-center">
            <div class="flex flex-col items-center gap-3 text-center">
                <svg class="animate-spin h-10 w-10 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor"
                          d="M4 12a8 8 0 018-8v4l3-3-3-3v4a10 10 0 00-10 10h4z" />
                </svg>
                <p id="loadingText" class="text-base font-medium text-emerald-800 dark:text-emerald-200"></p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss" href="#">Dismiss</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/Crittr.App/js/critterMotion.js"></script>
    <script type="module">
        import { cycleLoadingText } from '/_content/Crittr.App/js/loadingText.js';
        cycleLoadingText('loadingText');
    </script>
</body>
</html>
